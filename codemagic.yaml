workflows:
  ios-build:
    name: iOS Build
    max_build_duration: 60

    environment:
      ios_signing:
        distribution_type: development
        bundle_identifier: com.seu.app
      vars:
        XCODE_WORKSPACE: "SeuApp.xcworkspace" # ou .xcodeproj
        XCODE_SCHEME: "SeuApp"
      xcode: latest

    scripts:
      - name: Install dependencies
        script: |
          if [ -f "Podfile" ]; then
            pod install
          fi

      - name: Build IPA
        script: |
          xcodebuild -workspace "$XCODE_WORKSPACE" \
                     -scheme "$XCODE_SCHEME" \
                     -configuration Release \
                     -archivePath $CM_BUILD_DIR/SeuApp.xcarchive \
                     archive

          xcodebuild -exportArchive \
                     -archivePath $CM_BUILD_DIR/SeuApp.xcarchive \
                     -exportOptionsPlist /tmp/exportOptions.plist \
                     -exportPath $CM_BUILD_DIR/build

    artifacts:
      - build/*.ipa
